name: Release APK

# 按架构（split-per-abi）打包 release APK。
# - 打 tag v* 时触发：构建三个单架构 APK 并发布到 GitHub Release。
# - 也可在 Actions 页手动触发（workflow_dispatch）产出 artifact。
# 单架构包体远小于 universal（arm64 约 26MB vs 35MB），且低于 30MB，
# 便于直接分发。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 有 keystore secret 就用独立 release key 签名，否则回退 debug 签名。
      HAS_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - run: flutter pub get

      # 从仓库 secrets 还原独立 release keystore（可选）。
      # 需要配置的 secrets：KEYSTORE_BASE64（`base64 -w0 android/saole-upload.jks`）、
      # STORE_PASSWORD、KEY_PASSWORD、KEY_ALIAS。缺失则本步跳过，release 回退 debug 签名。
      - name: Restore release keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/saole-upload.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=saole-upload.jks
          EOF

      # 核心：按架构拆分打包。产出
      #   app-arm64-v8a-release.apk / app-armeabi-v7a-release.apk / app-x86_64-release.apk
      - name: Build split-per-abi release APKs
        run: flutter build apk --split-per-abi --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: saole-apks
          path: build/app/outputs/flutter-apk/*-release.apk
          if-no-files-found: error

      # 打了 tag 才发布到 GitHub Release。
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*-release.apk
